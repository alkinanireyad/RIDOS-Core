# RIDOS-Core — users.conf
# Place at: /etc/calamares/modules/users.conf

---

# Default groups new user is added to
defaultGroups:
    - users
    - lp
    - video
    - network
    - storage
    - wheel
    - audio
    - sudo

# Auto-login after install (set to false to require password at boot)
autologinGroup:  autologin
doAutologin:     false

# Set root password same as user password
setRootPassword: true

# Require strong password
passwordRequirements:
    nonempty: true
    minLength: 6

# Sudoers config — allow sudo group to run sudo without password
sudoersGroup:    sudo
