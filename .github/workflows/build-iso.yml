name: Build RIDOS-Core ISO

on:
  push:
    branches: [ main ]
    tags: [ "v*" ]
  workflow_dispatch:

# ─────────────────────────────────────────────────────────────────────────────
# RIDOS-Core 1.0 Nova
# Repository : alkinanireyad/RIDOS-Core
# Base       : Debian 12 Bookworm + Linux 6.12 LTS
# Desktop    : GNOME (Xorg default, Wayland available)
# Browser    : Brave (primary) + Firefox-ESR (fallback)
# Installer  : ridos-installer.py — custom GTK (autostarts 10s after GNOME)
# WiFi       : Full driver support 2008-2025 including HP MediaTek/Realtek
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  build-iso:
    runs-on: ubuntu-22.04
    timeout-minutes: 240

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Verify required files
        run: |
          echo "=== Checking required repo files ==="
          MISSING=0
          for f in \
            "ridos-core/ridos-installer.py" \
            "ridos-core/ridos-help.py" \
            "ridos-core/welcome-app.py" \
            "ridos-core/ridos_shell.py" \
            "build-system/scripts/configure-system.py" \
            "build-system/scripts/apply-branding.py" \
            "build-system/scripts/write-grub-config.py" \
            "build-system/scripts/install-ridos-files.sh" \
            "legal/LICENSE.txt"
          do
            if [ -f "$f" ]; then echo "  OK      : $f"
            else echo "  MISSING : $f"; MISSING=$((MISSING+1)); fi
          done
          [ $MISSING -eq 0 ] || { echo "ERROR: $MISSING files missing"; exit 1; }
          echo "All required files present."

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            debootstrap squashfs-tools xorriso \
            grub-pc-bin grub-efi-amd64-bin grub2-common \
            mtools dosfstools gnupg2 curl wget \
            imagemagick librsvg2-bin python3-pip
          echo "Build dependencies ready"

      - name: Bootstrap Debian bookworm
        run: |
          curl -fsSL https://ftp-master.debian.org/keys/release-12.asc \
            | sudo gpg --dearmor -o /usr/share/keyrings/debian-bookworm.gpg
          sudo debootstrap \
            --arch=amd64 --variant=minbase \
            --keyring=/usr/share/keyrings/debian-bookworm.gpg \
            --include=systemd,systemd-sysv,udev,sudo,locales,bash \
            bookworm chroot http://deb.debian.org/debian/
          echo "Bootstrap done"

      - name: Add third-party repositories
        run: |
          sudo mount --bind /dev  chroot/dev
          sudo mount --bind /proc chroot/proc
          sudo mount --bind /sys  chroot/sys

          printf 'deb http://deb.debian.org/debian bookworm main contrib non-free non-free-firmware\ndeb http://deb.debian.org/debian bookworm-updates main contrib non-free non-free-firmware\ndeb http://security.debian.org/debian-security bookworm-security main contrib non-free non-free-firmware\n' \
            | sudo tee chroot/etc/apt/sources.list > /dev/null

          sudo chroot chroot bash -c "
            apt-get install -y curl gnupg2 apt-transport-https ca-certificates 2>/dev/null || true
            curl -fsSLo /usr/share/keyrings/brave-browser-archive-keyring.gpg \
              https://brave-browser-apt-release.s3.brave.com/brave-browser-archive-keyring.gpg && \
            echo 'deb [signed-by=/usr/share/keyrings/brave-browser-archive-keyring.gpg arch=amd64] https://brave-browser-apt-release.s3.brave.com/ stable main' \
              > /etc/apt/sources.list.d/brave-browser.list
          " || echo "WARNING: Brave repo failed"

          sudo chroot chroot bash -c "
            curl -fsSL https://packages.microsoft.com/keys/microsoft.asc \
              | gpg --dearmor -o /usr/share/keyrings/microsoft.gpg && \
            echo 'deb [arch=amd64 signed-by=/usr/share/keyrings/microsoft.gpg] https://packages.microsoft.com/repos/code stable main' \
              > /etc/apt/sources.list.d/vscode.list
          " || echo "WARNING: VS Code repo failed"

          sudo chroot chroot apt-get update -qq || true
          sudo umount chroot/sys  || true
          sudo umount chroot/proc || true
          sudo umount chroot/dev  || true
          echo "Repositories configured"

      - name: Install all packages
        run: |
          sudo mount --bind /dev  chroot/dev
          sudo mount --bind /proc chroot/proc
          sudo mount --bind /sys  chroot/sys
          sudo mount --bind /run  chroot/run

          # ── Core boot + live system ───────────────────────────────────────
          # linux-headers-amd64 added: required for DKMS WiFi drivers to compile
          sudo chroot chroot apt-get install -y \
            live-boot live-boot-initramfs-tools \
            linux-image-amd64 linux-headers-amd64 initramfs-tools \
            grub-pc-bin grub2-common grub-common \
            grub-efi-amd64-bin efibootmgr os-prober \
            bash-completion tzdata locales cryptsetup \
            policykit-1-gnome apt-transport-https ca-certificates \
            parted gparted squashfs-tools \
            dkms build-essential

          sudo chroot chroot apt-get install -y grub-pc        || true
          sudo chroot chroot apt-get install -y grub-efi-amd64 || true

          # ── WiFi drivers — comprehensive 2008-2025 coverage ───────────────
          # Each family is separate so one failure does not block others.

          # Intel WiFi — most common (ThinkPad, Dell XPS, HP Spectre/Envy/EliteBook)
          sudo chroot chroot apt-get install -y \
            firmware-iwlwifi \
            --no-install-recommends || true

          # Atheros/Qualcomm WiFi — many 2008-2020 laptops
          sudo chroot chroot apt-get install -y \
            firmware-atheros \
            --no-install-recommends || true

          # Realtek WiFi — budget laptops + USB adapters
          # Covers RTL8188/RTL8192/RTL8723/RTL8821/RTL8822/RTL8852
          sudo chroot chroot apt-get install -y \
            firmware-realtek \
            --no-install-recommends || true

          # Realtek RTL8821CE DKMS driver — HP 250/255/15/14 2018-2021
          # This is the most common missing HP WiFi driver
          sudo chroot chroot apt-get install -y \
            rtl8821ce-dkms \
            --no-install-recommends || true

          # Realtek RTL88x2bu DKMS — USB WiFi adapters (TP-Link, Asus)
          sudo chroot chroot apt-get install -y \
            rtl88x2bu-dkms \
            --no-install-recommends || true

          # Ralink/MediaTek WiFi — 2010-2022 budget laptops
          sudo chroot chroot apt-get install -y \
            firmware-ralink \
            --no-install-recommends || true

          # MediaTek MT7921/MT7922 — HP laptops 2021-2024
          # This is the second most common missing HP WiFi driver
          sudo chroot chroot apt-get install -y \
            firmware-mediatek \
            --no-install-recommends || true

          # Broadcom WiFi — MacBooks, HP/Dell 2010-2018
          sudo chroot chroot apt-get install -y \
            firmware-b43-installer b43-fwcutter \
            --no-install-recommends || true

          # Broadcom STA driver (wl) — older Broadcom chips
          sudo chroot chroot apt-get install -y \
            broadcom-sta-dkms \
            --no-install-recommends || true

          # Wired NIC firmware
          sudo chroot chroot apt-get install -y \
            firmware-bnx2 firmware-bnx2x firmware-intelnic \
            --no-install-recommends || true

          # All remaining firmware + microcode
          sudo chroot chroot apt-get install -y \
            firmware-misc-nonfree \
            firmware-linux \
            firmware-linux-free \
            firmware-linux-nonfree \
            intel-microcode \
            amd64-microcode \
            fwupd fwupd-signed \
            --no-install-recommends || true

          # WiFi management tools — required for ALL WiFi to function
          sudo chroot chroot apt-get install -y \
            wpasupplicant \
            wireless-tools \
            rfkill \
            usb-modeswitch \
            usb-modeswitch-data \
            iw \
            network-manager \
            network-manager-gnome

          # ── GNOME desktop ─────────────────────────────────────────────────
          sudo chroot chroot apt-get install -y \
            gnome-core gnome-shell gnome-session \
            gnome-terminal gnome-text-editor \
            gnome-control-center gnome-tweaks \
            gnome-software gnome-software-plugin-flatpak \
            gnome-shell-extensions gnome-menus \
            gdm3 nautilus gedit \
            xwayland xorg xserver-xorg \
            network-manager-gnome \
            gvfs gvfs-backends \
            dconf-cli dconf-gsettings-backend

          # ── Graphics drivers ──────────────────────────────────────────────
          sudo chroot chroot apt-get install -y \
            xserver-xorg-video-all xserver-xorg-input-all \
            xserver-xorg-video-intel xserver-xorg-video-amdgpu \
            xserver-xorg-video-nouveau xserver-xorg-video-vesa \
            xserver-xorg-video-fbdev \
            mesa-vulkan-drivers libgl1-mesa-dri \
            --no-install-recommends || true

          # ── Audio ─────────────────────────────────────────────────────────
          sudo chroot chroot apt-get install -y \
            pulseaudio pulseaudio-utils alsa-utils

          # ── VM guest tools ────────────────────────────────────────────────
          sudo chroot chroot apt-get install -y \
            virtualbox-guest-utils virtualbox-guest-x11 \
            spice-vdagent \
            open-vm-tools open-vm-tools-desktop || true

          # ── Browsers ──────────────────────────────────────────────────────
          sudo chroot chroot apt-get install -y brave-browser \
            && echo "Brave OK" || echo "WARNING: Brave failed"
          sudo chroot chroot apt-get install -y firefox-esr

          # ── VS Code ───────────────────────────────────────────────────────
          sudo chroot chroot apt-get install -y code \
            && echo "VS Code OK" || echo "WARNING: VS Code failed"

          # ── Python + GTK (required for installer) ─────────────────────────
          sudo chroot chroot apt-get install -y \
            python3 python3-pip python3-venv python3-tk \
            python3-gi python3-gi-cairo \
            gir1.2-gtk-3.0 gir1.2-gtk-4.0 \
            python3-psutil python3-requests \
            python3-flask python3-flask-socketio

          # ── Development tools ─────────────────────────────────────────────
          sudo chroot chroot apt-get install -y \
            gcc g++ make cmake \
            git git-gui vim nano \
            curl wget zip unzip p7zip-full \
            jq shellcheck

          # ── Pro IT: Network & Analysis ────────────────────────────────────
          sudo chroot chroot apt-get install -y \
            nmap wireshark wireshark-common tshark \
            tcpdump netcat-openbsd ncat \
            traceroute mtr-tiny iperf3 \
            net-tools dnsutils whois \
            ipcalc arping ethtool \
            openssh-client openssh-server

          # ── Pro IT: Security ──────────────────────────────────────────────
          sudo chroot chroot apt-get install -y \
            aircrack-ng john hydra hashcat \
            nikto sqlmap dirb \
            steghide binwalk foremost \
            firejail wireguard wireguard-tools \
            gnupg2 openssl

          # ── Pro IT: System Monitoring ─────────────────────────────────────
          sudo chroot chroot apt-get install -y \
            htop btop iotop iftop nethogs \
            ncdu lshw dmidecode \
            smartmontools hdparm \
            sysstat lsof strace

          # ── Pro IT: Modern CLI tools ──────────────────────────────────────
          sudo chroot chroot apt-get install -y \
            bat ripgrep fd-find \
            neofetch tree tmux screen fzf

          # ── Pro IT: Disk & Recovery ───────────────────────────────────────
          sudo chroot chroot apt-get install -y \
            parted testdisk gddrescue \
            rsync dosfstools ntfs-3g exfat-fuse \
            squashfs-tools \
            e2fsprogs \
            xfsprogs \
            fdisk

          # ── Containers & DevOps ───────────────────────────────────────────
          sudo chroot chroot apt-get install -y \
            docker.io docker-compose ansible || true

          # ── Web & API tools ───────────────────────────────────────────────
          sudo chroot chroot apt-get install -y \
            httpie lynx proxychains4

          # ── System utilities ──────────────────────────────────────────────
          sudo chroot chroot apt-get install -y \
            flatpak timeshift cockpit \
            zram-tools tlp tlp-rdw \
            bluetooth bluez \
            pciutils usbutils acpi acpid laptop-detect

          sudo umount chroot/run  || true
          sudo umount chroot/sys  || true
          sudo umount chroot/proc || true
          sudo umount chroot/dev  || true
          echo "All packages installed successfully"

      - name: Create ridos user
        run: |
          sudo mount --bind /dev  chroot/dev
          sudo mount --bind /proc chroot/proc
          sudo mount --bind /sys  chroot/sys

          sudo chroot chroot useradd \
            --create-home --shell /bin/bash \
            --groups sudo,audio,video,netdev,plugdev \
            ridos 2>/dev/null || true

          echo "ridos:ridos" | sudo chroot chroot chpasswd
          echo "root:ridos"  | sudo chroot chroot chpasswd

          printf 'ridos ALL=(ALL) NOPASSWD:ALL\n' \
            | sudo tee chroot/etc/sudoers.d/ridos > /dev/null
          sudo chmod 440 chroot/etc/sudoers.d/ridos

          sudo chroot chroot usermod -aG wireshark ridos 2>/dev/null || true
          sudo chroot chroot usermod -aG docker    ridos 2>/dev/null || true

          echo "--- Verifying user ---"
          sudo chroot chroot id ridos
          sudo chroot chroot grep ridos /etc/passwd

          sudo umount chroot/sys  || true
          sudo umount chroot/proc || true
          sudo umount chroot/dev  || true
          echo "User ridos: username=ridos password=ridos"

      - name: Configure system
        run: |
          sudo cp build-system/scripts/configure-system.py chroot/tmp/
          sudo mount --bind /dev  chroot/dev
          sudo mount --bind /proc chroot/proc
          sudo mount --bind /sys  chroot/sys
          sudo chroot chroot python3 /tmp/configure-system.py
          sudo umount chroot/sys  || true
          sudo umount chroot/proc || true
          sudo umount chroot/dev  || true
          echo "System configured"

      - name: Apply branding
        run: |
          sudo cp build-system/scripts/apply-branding.py chroot/tmp/
          sudo mount --bind /dev  chroot/dev
          sudo mount --bind /proc chroot/proc
          sudo mount --bind /sys  chroot/sys
          sudo chroot chroot python3 /tmp/apply-branding.py || true
          sudo umount chroot/sys  || true
          sudo umount chroot/proc || true
          sudo umount chroot/dev  || true
          echo "Branding applied"

      - name: Install RIDOS-Core files
        run: |
          chmod +x build-system/scripts/install-ridos-files.sh
          sudo bash build-system/scripts/install-ridos-files.sh

      # ── Verify critical files are in chroot before building squashfs ──────
      - name: Verify chroot integrity
        run: |
          echo "=== Verifying critical files in chroot ==="
          FAIL=0

          # 1. Installer must be present
          if [ -f "chroot/opt/ridos-core/bin/ridos-installer.py" ]; then
            echo "  OK : ridos-installer.py"
          else
            echo "  MISSING: ridos-installer.py — upload it to ridos-core/ in repo"
            FAIL=1
          fi

          # 2. unsquashfs must be present (installer uses it to copy filesystem)
          if chroot chroot which unsquashfs > /dev/null 2>&1; then
            echo "  OK : unsquashfs ($(chroot chroot which unsquashfs))"
          else
            echo "  MISSING: unsquashfs — installing squashfs-tools..."
            sudo mount --bind /dev  chroot/dev
            sudo mount --bind /proc chroot/proc
            sudo mount --bind /sys  chroot/sys
            sudo chroot chroot apt-get install -y squashfs-tools
            sudo umount chroot/sys chroot/proc chroot/dev || true
          fi

          # 3. Python3 + GTK must be present (installer runtime dependency)
          if chroot chroot python3 -c "import gi" > /dev/null 2>&1; then
            echo "  OK : python3 + gi (GTK)"
          else
            echo "  WARNING: python3-gi not found — installer may fail"
          fi

          # 4. grub-install must be present
          if chroot chroot which grub-install > /dev/null 2>&1; then
            echo "  OK : grub-install"
          else
            echo "  MISSING: grub-install — GRUB installation will fail!"
            FAIL=1
          fi

          # 5. Kernel must be present
          KERN=$(ls chroot/boot/vmlinuz-* 2>/dev/null | sort -V | tail -1)
          if [ -n "$KERN" ]; then
            echo "  OK : kernel: $KERN"
          else
            echo "  MISSING: no kernel in chroot/boot/ !"
            FAIL=1
          fi

          if [ "$FAIL" -eq 1 ]; then
            echo ""
            echo "ERROR: Critical files missing from chroot. Aborting build."
            exit 1
          fi
          echo ""
          echo "Chroot integrity check passed."

      # ── Compile Rust/GTK4 welcome app ─────────────────────────────────────
      # Skips gracefully if source files are not in the repo.
      # Adds ~20 min to build time. Binary ends up at:
      # /opt/ridos-core/bin/ridos-welcome
      - name: Build ridos-welcome (Rust + GTK4)
        run: |
          if [ -f "build-system/scripts/build-ridos-welcome.sh" ] && \
             [ -f "ridos-welcome/Cargo.toml" ] && \
             [ -f "ridos-welcome/src/main.rs" ]; then
            echo "Building Rust welcome app..."
            chmod +x build-system/scripts/build-ridos-welcome.sh
            sudo bash build-system/scripts/build-ridos-welcome.sh
          else
            echo "INFO: ridos-welcome source not found — skipping Rust build."
            echo "To enable: add ridos-welcome/Cargo.toml and ridos-welcome/src/main.rs"
            echo "and build-system/scripts/build-ridos-welcome.sh to your repo."
          fi

      # ── CRITICAL: Force unmount ALL bind mounts before mksquashfs ───────────
      # If any previous step left bind mounts active (e.g. Rust build failed),
      # mksquashfs would compress /dev /proc /sys causing kernel panic on boot.
      - name: Force unmount chroot before squashfs
        run: |
          echo "=== Releasing any remaining chroot mounts ==="
          for dir in dev/pts dev proc sys run boot/efi; do
            sudo umount -l chroot/$dir 2>/dev/null || true
          done
          echo "=== Verifying no active mounts remain ==="
          if mount | grep -q "$(pwd)/chroot"; then
            echo "WARNING: some mounts still active:"
            mount | grep "$(pwd)/chroot"
            echo "Force unmounting..."
            mount | grep "$(pwd)/chroot" | awk '{print $3}' |               xargs -I{} sudo umount -l {} 2>/dev/null || true
          else
            echo "Clean: no active chroot mounts."
          fi

      - name: Build squashfs filesystem
        run: |
          sudo mksquashfs chroot filesystem.squashfs \
            -comp zstd -Xcompression-level 15 -e boot -noappend
          echo "squashfs size: $(du -sh filesystem.squashfs | cut -f1)"
          # Verify squashfs is large enough to be valid
          SIZE_MB=$(du -m filesystem.squashfs | cut -f1)
          echo "squashfs size in MB: $SIZE_MB"
          if [ "$SIZE_MB" -lt 1000 ]; then
            echo "ERROR: squashfs is too small ($SIZE_MB MB) - expected 2000+ MB"
            exit 1
          fi
          echo "squashfs size OK."

      - name: Prepare ISO structure
        run: |
          mkdir -p iso/live iso/boot/grub
          cp filesystem.squashfs iso/live/
          KERNEL=$(ls chroot/boot/vmlinuz-* 2>/dev/null | sort -V | tail -1)
          INITRD=$(ls chroot/boot/initrd.img-* 2>/dev/null | sort -V | tail -1)
          if [ -z "$KERNEL" ] || [ -z "$INITRD" ]; then
            echo "ERROR: kernel or initrd not found in chroot/boot/"
            ls chroot/boot/ || true
            exit 1
          fi
          cp "$KERNEL" iso/live/vmlinuz
          cp "$INITRD" iso/live/initrd
          python3 build-system/scripts/write-grub-config.py
          echo "ISO structure ready — kernel: $KERNEL"

      - name: Build GRUB and create bootable ISO
        run: |
          grub-mkimage -O i386-pc -o bios.core.img \
            -p "/boot/grub" iso9660 linux normal biosdisk search
          cat /usr/lib/grub/i386-pc/cdboot.img bios.core.img > bios.img

          grub-mkimage -O x86_64-efi -o bootx64.efi \
            -p "/boot/grub" iso9660 linux normal search

          dd if=/dev/zero of=efi.img bs=1M count=10 status=none
          mkfs.vfat -F 12 efi.img
          mmd  -i efi.img ::/EFI ::/EFI/boot
          mcopy -i efi.img bootx64.efi ::/EFI/boot/bootx64.efi

          mkdir -p iso/boot/grub/i386-pc
          cp /usr/lib/grub/i386-pc/*.mod iso/boot/grub/i386-pc/ 2>/dev/null || true
          cp /usr/lib/grub/i386-pc/*.lst iso/boot/grub/i386-pc/ 2>/dev/null || true
          cp bios.img iso/boot/grub/bios.img

          xorriso -as mkisofs \
            -iso-level 3 \
            -full-iso9660-filenames \
            -volid "RIDOS_CORE_1.0" \
            -publisher "RIDOS-Core Project — alkinanireyad" \
            --grub2-mbr /usr/lib/grub/i386-pc/boot_hybrid.img \
            -partition_offset 16 \
            --mbr-force-bootable \
            -append_partition 2 0xef efi.img \
            -appended_part_as_gpt \
            -iso_mbr_part_type 0x00 \
            -c boot/grub/boot.cat \
            -b boot/grub/bios.img \
            -no-emul-boot \
            -boot-load-size 4 \
            -boot-info-table \
            --grub2-boot-info \
            -eltorito-alt-boot \
            -e --interval:appended_partition_2:all:: \
            -no-emul-boot \
            -o ridos-core-1.0-nova-x86_64.iso \
            -graft-points \
              "/boot/grub/bios.img=bios.img" \
              "/=iso"

          ls -lh ridos-core-1.0-nova-x86_64.iso
          md5sum    ridos-core-1.0-nova-x86_64.iso \
            > ridos-core-1.0-nova-x86_64.iso.md5
          sha256sum ridos-core-1.0-nova-x86_64.iso \
            > ridos-core-1.0-nova-x86_64.iso.sha256
          echo "ISO ready!"

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: RIDOS-Core-1.0-Nova
          path: |
            ridos-core-1.0-nova-x86_64.iso
            ridos-core-1.0-nova-x86_64.iso.md5
            ridos-core-1.0-nova-x86_64.iso.sha256
          retention-days: 30

      - name: Create GitHub Release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          gh release create "${{ github.ref_name }}" \
            ridos-core-1.0-nova-x86_64.iso \
            ridos-core-1.0-nova-x86_64.iso.md5 \
            ridos-core-1.0-nova-x86_64.iso.sha256 \
            --title "RIDOS-Core ${{ github.ref_name }} Nova" \
            --notes "RIDOS-Core 1.0 Nova — Rust-Ready Linux. Login: ridos/ridos. GPL v3."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
