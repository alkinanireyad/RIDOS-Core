# RIDOS-Core — partition.conf
# Place at: /etc/calamares/modules/partition.conf

---

# Allow manual, automatic, and alongside-existing partitioning
efiSystemPartition:     "/boot/efi"
efiSystemPartitionSize: "300MiB"
efiSystemPartitionName: "EFI System Partition"

# Filesystem to use for root partition
defaultFileSystemType:  "ext4"

# Show SMART disk info if available
drawNestedPartitions:   false

# Allow users to pick install alongside existing OS
allowManualPartitioning:    true
allowReplacePartitioning:   true
allowEraseAll:              true
allowResizePartition:       false

# Swap settings
initialSwapChoice: "recommended"
