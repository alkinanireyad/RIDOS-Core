# RIDOS-Core — unpackfs.conf
# Place at: /etc/calamares/modules/unpackfs.conf
# This tells Calamares where your live squashfs filesystem is located.

---

unpack:
    -   source: /run/live/medium/live/filesystem.squashfs
        sourcefs: squashfs
        destination: ""

# If your squashfs is at a different path, update "source" above.
# Common alternative paths:
#   /lib/live/mount/medium/live/filesystem.squashfs
#   /cdrom/live/filesystem.squashfs
#   /run/initramfs/live/filesystem.squashfs
