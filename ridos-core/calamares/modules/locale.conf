# RIDOS-Core — locale.conf
# Place at: /etc/calamares/modules/locale.conf

---

# Default region and zone shown in installer
region:   "Asia"
zone:     "Baghdad"

# Default locale
locale:   "en_US.UTF-8"

# GeoIP lookup to auto-detect location (optional, requires internet)
geoip-style: json
geoip-url:   "https://geoip.kde.org/v1/calamares"
