name: Build RIDOS-Core ISO

on:
  push:
    branches: [ main ]
    tags: [ "v*" ]
  workflow_dispatch:

# ─────────────────────────────────────────────────────────────────────────────
# RIDOS-Core 1.0 Nova
# Repository : alkinanireyad/RIDOS-Core
# Base       : Debian 12 Bookworm + Linux 6.12 LTS
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  build-iso:
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Verify required files
        run: |
          echo "=== Checking required repo files ==="
          MISSING=0
          for f in \
            "ridos-core/ridos-installer.py" \
            "ridos-core/ridos-help.py" \
            "ridos-core/welcome-app.py" \
            "ridos-core/ridos_shell.py" \
            "build-system/scripts/configure-system.py" \
            "build-system/scripts/apply-branding.py" \
            "build-system/scripts/write-grub-config.py" \
            "build-system/scripts/install-ridos-files.sh" \
            "legal/LICENSE.txt"
          do
            if [ -f "$f" ]; then 
              echo "  OK      : $f"
            else 
              echo "  MISSING : $f"
              MISSING=$((MISSING+1))
            fi
          done
          if [ $MISSING -ne 0 ]; then
            echo "ERROR: $MISSING files missing"
            exit 1
          fi

      - name: Install build dependencies
        run: |
          # إضافة مستودع حديث لضمان توفر مكتبات GTK4 >= 4.7
          sudo add-apt-repository ppa:gnome-team/ppa -y
          sudo apt-get update -qq
          sudo apt-get install -y \
            debootstrap \
            squashfs-tools \
            xorriso \
            grub-pc-bin \
            grub-efi-amd64-bin \
            grub2-common \
            mtools \
            dosfstools \
            gnupg2 \
            curl \
            wget \
            imagemagick \
            librsvg2-bin \
            python3-pip \
            libgtk-4-dev \
            pkg-config \
            libadwaita-1-dev \
            build-essential \
            libglib2.0-dev \
            libpango1.0-dev \
            libcairo2-dev
          echo "Build dependencies ready (GTK4 Fixed via PPA)"

      - name: Bootstrap Debian bookworm
        run: |
          curl -fsSL https://ftp-master.debian.org/keys/release-12.asc \
            | sudo gpg --dearmor -o /usr/share/keyrings/debian-bookworm.gpg
          sudo debootstrap \
            --arch=amd64 \
            --variant=minbase \
            --keyring=/usr/share/keyrings/debian-bookworm.gpg \
            --include=systemd,systemd-sysv,udev,sudo,locales,bash \
            bookworm chroot http://deb.debian.org/debian/
            - name: Add third-party repositories
        run: |
          sudo mount --bind /dev  chroot/dev
          sudo mount --bind /proc chroot/proc
          sudo mount --bind /sys  chroot/sys

          # Configure Debian repositories
          printf 'deb http://deb.debian.org/debian bookworm main contrib non-free non-free-firmware\n' \
            | sudo tee chroot/etc/apt/sources.list
          printf 'deb http://deb.debian.org/debian bookworm-updates main contrib non-free non-free-firmware\n' \
            | sudo tee -a chroot/etc/apt/sources.list
          printf 'deb http://security.debian.org/debian-security bookworm-security main contrib non-free non-free-firmware\n' \
            | sudo tee -a chroot/etc/apt/sources.list

          # Install repository management tools
          sudo chroot chroot apt-get update
          sudo chroot chroot apt-get install -y \
            curl \
            gnupg2 \
            ca-certificates \
            apt-transport-https

          # Add Brave Browser repository
          sudo chroot chroot bash -c "curl -fsSLo /usr/share/keyrings/brave-browser-archive-keyring.gpg https://brave-browser-apt-release.s3.brave.com/brave-browser-archive-keyring.gpg"
          echo 'deb [signed-by=/usr/share/keyrings/brave-browser-archive-keyring.gpg arch=amd64] https://brave-browser-apt-release.s3.brave.com/ stable main' \
            | sudo tee chroot/etc/apt/sources.list.d/brave-browser.list

          # Add VS Code repository
          sudo chroot chroot bash -c "curl -fsSL https://packages.microsoft.com/keys/microsoft.asc | gpg --dearmor -o /usr/share/keyrings/microsoft.gpg"
          echo 'deb [arch=amd64 signed-by=/usr/share/keyrings/microsoft.gpg] https://packages.microsoft.com/repos/code stable main' \
            | sudo tee chroot/etc/apt/sources.list.d/vscode.list

          sudo chroot chroot apt-get update
          sudo umount chroot/sys chroot/proc chroot/dev || true

      - name: Install base system packages
        run: |
          sudo mount --bind /dev  chroot/dev
          sudo mount --bind /proc chroot/proc
          sudo mount --bind /sys  chroot/sys
          
          sudo chroot chroot apt-get install -y \
            live-boot \
            live-boot-initramfs-tools \
            linux-image-amd64 \
            initramfs-tools \
            grub-pc-bin \
            grub-efi-amd64-bin \
            grub2-common \
            efibootmgr \
            os-prober \
            bash-completion \
            sudo \
            locales \
            tzdata \
            network-manager \
            network-manager-gnome \
            firmware-linux \
            firmware-linux-free \
            firmware-linux-
            - name: Add third-party repositories
        run: |
          sudo mount --bind /dev  chroot/dev
          sudo mount --bind /proc chroot/proc
          sudo mount --bind /sys  chroot/sys

          # Configure Debian repositories
          printf 'deb http://deb.debian.org/debian bookworm main contrib non-free non-free-firmware\n' \
            | sudo tee chroot/etc/apt/sources.list
          printf 'deb http://deb.debian.org/debian bookworm-updates main contrib non-free non-free-firmware\n' \
            | sudo tee -a chroot/etc/apt/sources.list
          printf 'deb http://security.debian.org/debian-security bookworm-security main contrib non-free non-free-firmware\n' \
            | sudo tee -a chroot/etc/apt/sources.list

          # Install repository management tools
          sudo chroot chroot apt-get update
          sudo chroot chroot apt-get install -y \
            curl \
            gnupg2 \
            ca-certificates \
            apt-transport-https

          # Add Brave Browser repository
          sudo chroot chroot bash -c "curl -fsSLo /usr/share/keyrings/brave-browser-archive-keyring.gpg https://brave-browser-apt-release.s3.brave.com/brave-browser-archive-keyring.gpg"
          echo 'deb [signed-by=/usr/share/keyrings/brave-browser-archive-keyring.gpg arch=amd64] https://brave-browser-apt-release.s3.brave.com/ stable main' \
            | sudo tee chroot/etc/apt/sources.list.d/brave-browser.list

          # Add VS Code repository
          sudo chroot chroot bash -c "curl -fsSL https://packages.microsoft.com/keys/microsoft.asc | gpg --dearmor -o /usr/share/keyrings/microsoft.gpg"
          echo 'deb [arch=amd64 signed-by=/usr/share/keyrings/microsoft.gpg] https://packages.microsoft.com/repos/code stable main' \
            | sudo tee chroot/etc/apt/sources.list.d/vscode.list

          sudo chroot chroot apt-get update
          sudo umount chroot/sys chroot/proc chroot/dev || true

      - name: Install base system packages
        run: |
          sudo mount --bind /dev  chroot/dev
          sudo mount --bind /proc chroot/proc
          sudo mount --bind /sys  chroot/sys
          
          sudo chroot chroot apt-get install -y \
            live-boot \
            live-boot-initramfs-tools \
            linux-image-amd64 \
            initramfs-tools \
            grub-pc-bin \
            grub-efi-amd64-bin \
            grub2-common \
            efibootmgr \
            os-prober \
            bash-completion \
            sudo \
            locales \
            tzdata \
            network-manager \
            network-manager-gnome \
            firmware-linux \
            firmware-linux-free \
            firmware-linux-nonfree
            sudo chroot chroot apt-get install -y \
            firmware-iwlwifi \
            firmware-atheros \
            firmware-realtek \
            firmware-ralink \
            firmware-libertas \
            firmware-brcm80211 \
            firmware-misc-nonfree \
            firmware-amd-graphics \
            firmware-intel-graphics \
            firmware-bnx2 \
            firmware-bnx2x \
            firmware-qlogic \
            intel-microcode \
            amd64-microcode \
            wireless-tools \
            wpasupplicant \
            rfkill \
            usb-modeswitch \
            pciutils \
            usbutils \
            lsb-release \
            hwdata \
            dkms \
            build-essential

          # Specific drivers for newer HP/Realtek cards (2020-2025)
          sudo chroot chroot apt-get install -y \
            rtl8821ce-dkms \
            rtl88x2bu-dkms \
            firmware-mediatek || true

          sudo umount chroot/sys chroot/proc chroot/dev || true

      - name: Install Desktop Environment (GNOME)
        run: |
          sudo mount --bind /dev  chroot/dev
          sudo mount --bind /proc chroot/proc
          sudo mount --bind /sys  chroot/sys
          
          # Installing core GNOME components
          sudo chroot chroot apt-get install -y \
            gnome-core \
            gnome-shell \
            gnome-session \
            gnome-terminal \
            gnome-control-center \
            gnome-tweaks \
            nautilus \
            gdm3 \
            xserver-xorg \
            xserver-xorg-video-all \
            xserver-xorg-input-all \
            desktop-base \
            adwaita-icon-theme \
            fonts-cantarell \
            fonts-noto-core \
            fonts-noto-cjk \
            fonts-noto-ui-core

          sudo umount chroot/sys chroot/proc chroot/dev || true

      - name: Install Browser and Main Apps
        run: |
          sudo mount --bind /dev  chroot/dev
          sudo mount --bind /proc chroot/proc
          sudo mount --bind /sys  chroot/sys

          sudo chroot chroot apt-get install -y \
            brave-browser \
            firefox-esr \
            code \
            python3-gi \
            python3-requests \
            python3-pip \
            python3-yaml \
            gir1.2-gtk-4.0 \
            libadwaita-1-0 \
            vlc \
            gparted \
            htop \
            btop \
            curl \
            wget \
            git
            # --- IT & Cybersecurity Tools (Pro Suite) ---
          sudo chroot chroot apt-get install -y \
            nmap \
            wireshark \
            tcpdump \
            netcat-openbsd \
            traceroute \
            aircrack-ng \
            john \
            hydra \
            hashcat \
            nikto \
            sqlmap \
            docker.io \
            docker-compose \
            ansible \
            cockpit

          sudo umount chroot/sys chroot/proc chroot/dev || true

      - name: Create RIDOS User and Permissions
        run: |
          sudo chroot chroot useradd -m -s /bin/bash -G sudo,audio,video,docker,wireshark ridos || true
          echo "ridos:ridos" | sudo chroot chroot chpasswd
          echo "root:ridos"  | sudo chroot chroot chpasswd
          
          # Allow sudo without password for the installer experience
          printf 'ridos ALL=(ALL) NOPASSWD:ALL\n' \
            | sudo tee chroot/etc/sudoers.d/ridos > /dev/null
          sudo chmod 0440 chroot/etc/sudoers.d/ridos

      - name: Apply System Configurations and Branding
        run: |
          sudo cp build-system/scripts/configure-system.py chroot/tmp/
          sudo cp build-system/scripts/apply-branding.py chroot/tmp/
          
          sudo mount --bind /dev chroot/dev
          sudo mount --bind /proc chroot/proc
          sudo mount --bind /sys chroot/sys
          
          sudo chroot chroot python3 /tmp/configure-system.py
          sudo chroot chroot python3 /tmp/apply-branding.py || true
          
          sudo umount chroot/sys chroot/proc chroot/dev || true

      - name: Build RIDOS Welcome App (Rust + GTK4)
        run: |
          if [ -d "ridos-welcome" ]; then
            cd ridos-welcome
            # استخدام مسارات المكتبات التي تم تثبيتها من الـ PPA لضمان نجاح الربط
            export PKG_CONFIG_PATH=/usr/lib/x86_64-linux-gnu/pkgconfig:/usr/share/pkgconfig
            cargo build --release
            
            # حقن الملف التنفيذي مباشرة في مسار النظام داخل الـ chroot
            sudo mkdir -p ../chroot/usr/bin/
            sudo cp target/release/ridos-welcome ../chroot/usr/bin/
            sudo chmod +x ../chroot/usr/bin/ridos-welcome
            echo "✅ RIDOS-Welcome compiled and injected into chroot system"
          else
            echo "⚠️ Warning: ridos-welcome folder not found in repository root"
          fi

      - name: Install System Internal Scripts
        run: |
          sudo mkdir -p chroot/usr/share/ridos/
          sudo cp ridos-core/*.py chroot/usr/share/ridos/
          sudo cp legal/LICENSE.txt chroot/usr/share/ridos/
          
          # استدعاء سكربت توزيع الملفات الأساسي
          chmod +x build-system/scripts/install-ridos-files.sh
          sudo bash build-system/scripts/install-ridos-files.sh
          - name: Build squashfs filesystem
        run: |
          sudo mksquashfs chroot filesystem.squashfs \
            -comp zstd \
            -Xcompression-level 15 \
            -e boot \
            -noappend
          
          echo "Final SquashFS size: $(du -sh filesystem.squashfs | cut -f1)"

      - name: Prepare ISO structure
        run: |
          mkdir -p iso/live
          mkdir -p iso/boot/grub
          
          # Copy squashfs and kernel/initrd
          cp filesystem.squashfs iso/live/
          
          # Dynamically find the latest kernel and initrd
          KERNEL=$(ls chroot/boot/vmlinuz-* | sort -V | tail -1)
          INITRD=$(ls chroot/boot/initrd.img-* | sort -V | tail -1)
          
          cp "$KERNEL" iso/live/vmlinuz
          cp "$INITRD" iso/live/initrd
          
          # Generate GRUB configuration
          python3 build-system/scripts/write-grub-config.py

      - name: Build Final Bootable ISO
        run: |
          # Generate GRUB core image for BIOS boot
          grub-mkimage -O i386-pc -o bios.core.img -p "/boot/grub" \
            iso9660 linux normal biosdisk search
          
          cat /usr/lib/grub/i386-pc/cdboot.img bios.core.img > bios.img
          
          # Assembly with xorriso (Hybrid ISO: BIOS + UEFI support)
          xorriso -as mkisofs \
            -iso-level 3 \
            -full-iso9660-filenames \
            -volid "RIDOS_CORE_1.0" \
            -publisher "RIDOS-Core Project — alkinanireyad" \
            --grub2-mbr /usr/lib/grub/i386-pc/boot_hybrid.img \
            -partition_offset 16 \
            --mbr-force-bootable \
            -o ridos-core-1.0-nova-x86_64.iso \
            -b boot/grub/bios.img \
            -no-emul-boot \
            -boot-load-size 4 \
            -boot-info-table \
            --grub2-boot-info \
            -graft-points \
              "/boot/grub/bios.img=bios.img" \
              "/=iso"

          # Generate checksums for verification
          md5sum    ridos-core-1.0-nova-x86_64.iso > ridos-core-1.0-nova-x86_64.iso.md5
          sha256sum ridos-core-1.0-nova-x86_64.iso > ridos-core-1.0-nova-x86_64.iso.sha256
          echo "ISO build process completed successfully."

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: RIDOS-Core-1.0-Nova
          path: |
            ridos-core-1.0-nova-x86_64.iso
            ridos-core-1.0-nova-x86_64.iso.md5
            ridos-core-1.0-nova-x86_64.iso.sha256
          if-no-files-found: error
          retention-days: 7
