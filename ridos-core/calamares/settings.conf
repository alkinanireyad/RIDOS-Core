# RIDOS-Core 1.0 Nova — Calamares Main Settings
# Place this at: /etc/calamares/settings.conf

---

# Branding directory (matches /etc/calamares/branding/ridos/)
branding: ridos

# Show the installer in debug mode (set false for release)
debug: false

# Allow user to cancel/quit installation
prompt-install: false

# Require root to run
dont-chroot: false

# Installation sequence
sequence:
  - show:
    - welcome
    - locale
    - keyboard
    - partition
    - users
    - summary

  - exec:
    - partition
    - mount
    - unpackfs
    - machineid
    - fstab
    - locale
    - keyboard
    - localecfg
    - users
    - networkcfg
    - hwclock
    - grubcfg
    - bootloader
    - packages
    - removeuser
    - umount

  - show:
    - finished

# These modules run but are not shown as pages
modules-search: [ local, /usr/lib/calamares/modules ]
