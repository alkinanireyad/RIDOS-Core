# RIDOS-Core — packages.conf
# Place at: /etc/calamares/modules/packages.conf
# Removes live-session-only packages after installation and installs essentials.

---

backend: apt

# Run apt update before installing/removing
update_db: true

# Operations to perform
operations:
  - try_remove:
    # Live session tools not needed on installed system
    - live-boot
    - live-boot-initramfs-tools
    - live-config
    - live-config-sysvinit
    - live-tools
    - calamares                    # Remove installer itself after install
    - calamares-settings-debian

  - install:
    # Make sure these essentials are present
    - grub-pc                      # BIOS GRUB (auto-skipped if EFI)
    - grub-efi-amd64               # EFI GRUB (auto-skipped if BIOS)
    - os-prober                    # Detect other OSes for GRUB menu
    - linux-image-amd64
    - linux-headers-amd64
    - firmware-linux
    - firmware-linux-nonfree
