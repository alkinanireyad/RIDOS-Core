# RIDOS-Core — bootloader.conf
# Place at: /etc/calamares/modules/bootloader.conf
# Handles GRUB installation for both BIOS/MBR and EFI systems automatically.

---

# Install GRUB bootloader
efi-install-path: /boot/efi

# GRUB install options
grub:
    install-efi:  true    # Will auto-detect if EFI is available
    install-bios: true    # Fallback to BIOS/MBR if no EFI

# Overwrite existing bootloader entries
overwrite: true

# Extra kernel parameters added to GRUB boot entry
kernel-params: "quiet splash"
