# RIDOS-Core — welcome.conf
# Place at: /etc/calamares/modules/welcome.conf

---

# Conditions that must be met before install is allowed
requirements:
    requiredStorage:    8.0       # Minimum GB required
    requiredRam:        1.0       # Minimum RAM in GB
    internetCheckUrl:   "http://example.com"
    check:
        - storage
        - ram
        - power
    required:
        - storage
        - ram

# Show "What's new" or release notes URL (optional)
# showUrl: "https://ridos.example.com/release-notes"

# Allow user to proceed even without internet
allowUnsatisfied: false
